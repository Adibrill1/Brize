<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101318" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <title>Brize</title>
</head>
<body>
  <div id="map"></div>

  <!-- Capabilities append their chips here; only settings is built in. -->
  <div class="toolbar" role="toolbar" aria-label="App actions">
    <button id="settings-chip" class="chip" data-i18n-title="settings_title" title="Settings">⚙️</button>
  </div>

  <!-- Status filter chips, generated from the workspace configuration. -->
  <div class="filters" id="filters" role="group" aria-label="Filter by status"></div>

  <p id="empty-hint" class="empty-hint" data-i18n="empty_hint" hidden>Tap anywhere on the map to add your first item</p>

  <!-- Schema-driven entity editor: fields are generated from the active
       workspace's entity type configuration. -->
  <aside id="editor" class="editor" hidden aria-label="Entity editor">
    <form id="editor-form">
      <header>
        <h2 id="editor-title">Edit</h2>
        <button type="button" id="editor-close" class="icon-btn" aria-label="Close">✕</button>
      </header>

      <div id="editor-fields"></div>

      <p class="coords" id="editor-coords-row" hidden>📍 <span id="editor-coords"></span> <small data-i18n="drag_pin">(drag the pin to move)</small></p>

      <div id="editor-actions"></div>

      <footer>
        <button type="button" id="editor-delete" class="danger" data-i18n="delete">Delete</button>
        <span class="spacer"></span>
        <button type="button" id="editor-cancel" data-i18n="cancel">Cancel</button>
        <button type="submit" class="primary" data-i18n="save">Save</button>
      </footer>
    </form>
  </aside>

  <dialog id="draft-dialog">
    <h2 id="draft-title" data-i18n="draft_title">Draft</h2>
    <p class="dialog-hint" data-i18n="draft_hint">Edit freely — this is a starting point, you send it yourself.</p>
    <textarea id="draft-text" rows="10"></textarea>
    <footer>
      <button id="draft-copy" class="primary" data-i18n="copy">Copy</button>
      <span class="spacer"></span>
      <button id="draft-close" data-i18n="close">Close</button>
    </footer>
  </dialog>

  <dialog id="workspace-dialog">
    <h2 data-i18n="workspaces">Workspaces</h2>
    <div id="workspace-list"></div>
    <form id="workspace-form">
      <h2 data-i18n="new_workspace">New workspace</h2>
      <label><span data-i18n="workspace_name">Workspace name</span>
        <input name="wsname" type="text" data-i18n-ph="workspace_name_ph" autocomplete="off" required />
      </label>
      <label><span data-i18n="template">Template</span>
        <select name="template"></select>
      </label>
      <footer>
        <button type="button" id="workspace-close" data-i18n="close">Close</button>
        <span class="spacer"></span>
        <button type="submit" class="primary" data-i18n="create">Create</button>
      </footer>
    </form>
  </dialog>

  <dialog id="settings-dialog">
    <form id="settings-form" method="dialog">
      <h2 data-i18n="settings_title">Settings</h2>

      <label><span data-i18n="language">Language / שפה</span>
        <select name="lang">
          <option value="en">English</option>
          <option value="he">עברית</option>
        </select>
      </label>

      <label><span data-i18n="monthly_budget">Monthly budget target</span>
        <input name="monthlyBudget" type="number" min="0" step="1" placeholder="0" />
      </label>

      <label><span data-i18n="about_me">About me (context for AI drafts — write in English)</span>
        <textarea name="aboutMe" rows="3"></textarea>
      </label>

      <label><span data-i18n="api_key">Anthropic API key</span>
        <input name="anthropicApiKey" type="password" placeholder="sk-ant-…" autocomplete="off" />
      </label>
      <p class="dialog-hint" data-i18n="api_key_hint">Stored only on this device, sent only to api.anthropic.com.</p>

      <footer>
        <button type="button" id="settings-cancel" data-i18n="cancel">Cancel</button>
        <span class="spacer"></span>
        <button type="submit" class="primary" data-i18n="save">Save</button>
      </footer>
    </form>
  </dialog>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
